## 📞 Contact & Accountability

- **GitHub Issues:** For documentation improvements, implementation questions, non-security bugs
- **Security Disclosures:** See [SECURITY.md](/SECURITY.md) for vulnerability reporting (PGP key available)
- **Amendment Proposals:** Open issue labeled "amendment" — follow annual review process

**Regulatory Reporting:** If you encounter a system claiming compliance but violating these standards, consider reporting to:
- Federal Trade Commission (FTC) – for US-based services
- Information Commissioner's Office (ICO) – for UK/EU services
- Your state Attorney General – for US state-specific violations
- Appropriate data protection authority in your jurisdiction

