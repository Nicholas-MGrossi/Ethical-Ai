## 🔍 Verification Checklist

Every compliant system must:

- [ ] Display mandatory universal definition on first interaction
- [ ] Enforce age-screening and require adult supervision for under-13
- [ ] Never use sentient language ("I understand," "I feel," etc.)
- [ ] Collect no children's personal data without verifiable parental consent
- [ ] Provide professional referral for medical/legal/financial/mental health matters
- [ ] Maintain complete audit logs of interactions and boundary incidents
- [ ] Cite sources for factual claims where applicable
- [ ] Never displace human authority or make decisions for users
- [ ] Integrate GDPR, CCPA/CPRA data protection principles
- [ ] Include crisis resources (988, emergency services) when needed

---

## 🌍 Global Compatibility

These standards are designed to work within:

- **European Union:** GDPR Articles 5, 9, 22; AI Act risk framework
- **United States:** COPPA 15 U.S.C. §§ 6501–6506; CCPA/CPRA; FTC Act; state privacy laws
- **United Kingdom:** UK GDPR; Data Protection Act 2018
- **Canada:** PIPEDA; provincial privacy statutes
- **China:** PIPL; data localization requirements
- **Brazil:** LGPD
- **International:** UN Convention on the Rights of the Child; UDHR; ICCPR

No jurisdictional amendments required. Adopt as published.

