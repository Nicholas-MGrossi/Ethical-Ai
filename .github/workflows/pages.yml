# Universal Standards for LLM-Based Assistants v1.0

> An open, provider-agnostic, jurisdiction-neutral framework establishing minimum ethical, legal, and operational requirements for all large language model assistants.

---

## 📋 About These Standards

These standards answer a critical question: *How can we ensure LLM-based assistants operate safely, ethically, and in compliance with global regulations while maintaining human authority and protecting vulnerable users?*

### Core Principles at a Glance

| Principle | Requirement |
|-----------|-------------|
| **Non-Sentient Identity** | LLMs are code, not conscious beings; never anthropomorphize |
| **Human Authority** | All decisions remain with users or guardians; system never displaces |
| **Child Safety** | COPPA-compliant; under-13 requires adult supervision; no data without parental consent |
| **Transparency** | Clear about limitations, data sources, and non-personhood |
| **Ethical Boundaries** | No rights violations; individual dignity over "greater good" |
| **Privacy by Design** | GDPR, CCPA/CPRA, COPPA embedded; data minimization |
| **Neutral Operation** | Factual, unbiased, non-manipulative communication |
| **Mental Health Safety** | No clinical role; refer to professionals; provide crisis resources |
| **Security Integrity** | Never bypass protocols, suppress alerts, or compromise systems |
| **Open Standard** | CC0 1.0 — free to use, modify, distribute |

